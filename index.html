<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毛玻璃 · QQ登录个人空间</title>
    <style>
        /* ===== 全局基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0f1a24;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 夜间主题 (默认) */
        .theme-night {
            --bg-gradient-start: #1a2a35;
            --bg-gradient-end: #0f1a24;
            --content-bg: rgba(20, 30, 40, 0.3);
            --tabbar-bg-start: rgba(255, 255, 255, 0.2);
            --tabbar-bg-end: rgba(255, 255, 255, 0.05);
            --tabbar-border: rgba(255, 255, 255, 0.2);
            --tab-inactive: rgba(235, 245, 255, 0.7);
            --tab-active-bg: rgba(255, 255, 255, 0.2);
            --tab-active-border: rgba(255, 255, 255, 0.5);
            --placeholder-text: rgba(255, 255, 255, 0.9);
            --badge-bg: rgba(0, 0, 0, 0.4);
            --badge-border: rgba(255, 220, 100, 0.5);
            --h2-bg: rgba(0, 0, 0, 0.2);
            --h2-border: rgba(255, 255, 255, 0.25);
            --p-bg: rgba(0, 0, 0, 0.15);
            --p-border: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(0, 0, 0, 0.3);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-text: rgba(255, 255, 255, 0.9);
            --button-bg: rgba(255, 255, 255, 0.15);
            --button-hover: rgba(255, 255, 255, 0.25);
            --toast-bg: rgba(0, 0, 0, 0.6);
            --toast-border: rgba(255, 255, 255, 0.3);
            --success-color: #4caf50;
            --drawer-bg: rgba(30, 40, 50, 0.7);
            --drawer-item-hover: rgba(255, 255, 255, 0.15);
        }

        /* 日间主题 (明亮) */
        .theme-day {
            --bg-gradient-start: #e0e7ef;
            --bg-gradient-end: #c0d0e0;
            --content-bg: rgba(255, 255, 255, 0.25);
            --tabbar-bg-start: rgba(255, 255, 255, 0.5);
            --tabbar-bg-end: rgba(255, 255, 255, 0.3);
            --tabbar-border: rgba(255, 255, 255, 0.6);
            --tab-inactive: rgba(40, 50, 70, 0.8);
            --tab-active-bg: rgba(255, 255, 255, 0.6);
            --tab-active-border: rgba(255, 255, 255, 0.9);
            --placeholder-text: rgba(20, 30, 45, 0.95);
            --badge-bg: rgba(255, 255, 255, 0.4);
            --badge-border: rgba(100, 120, 200, 0.6);
            --h2-bg: rgba(255, 255, 255, 0.3);
            --h2-border: rgba(255, 255, 255, 0.6);
            --p-bg: rgba(255, 255, 255, 0.25);
            --p-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.4);
            --input-border: rgba(255, 255, 255, 0.7);
            --input-text: rgba(20, 30, 45, 0.95);
            --button-bg: rgba(255, 255, 255, 0.3);
            --button-hover: rgba(255, 255, 255, 0.5);
            --toast-bg: rgba(255, 255, 255, 0.7);
            --toast-border: rgba(255, 255, 255, 0.9);
            --success-color: #2e7d32;
            --drawer-bg: rgba(255, 255, 255, 0.7);
            --drawer-item-hover: rgba(0, 0, 0, 0.1);
        }

        .fullscreen-app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            backdrop-filter: blur(4px);
            position: relative;
            border: none;
            transition: background 0.3s ease;
        }

        .content-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: var(--content-bg);
            backdrop-filter: blur(8px);
            transition: background 0.3s ease;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* 毛玻璃卡片容器 */
        .glass-card {
            background: var(--p-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--p-border);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        /* 登录页面样式 */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .qq-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--tab-active-border);
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .qq-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            color: var(--placeholder-text);
            font-size: 14px;
            opacity: 0.6;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            color: var(--input-text);
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: var(--input-text);
            opacity: 0.5;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--tab-active-border);
            background: var(--tab-active-bg);
        }

        .login-btn {
            width: 100%;
            padding: 15px 20px;
            background: var(--button-bg);
            border: 1px solid var(--tab-active-border);
            border-radius: 30px;
            color: var(--placeholder-text);
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .password-hint {
            color: var(--placeholder-text);
            font-size: 14px;
            opacity: 0.7;
            margin-top: -10px;
        }

        /* 个人空间样式 */
        .profile-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--tab-active-border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nickname-section {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: center;
        }

        .nickname-input {
            flex: 1;
            padding: 12px 20px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            color: var(--input-text);
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .nickname-input:focus {
            outline: none;
            border-color: var(--tab-active-border);
        }

        .save-btn {
            padding: 12px 24px;
            background: var(--button-bg);
            border: 1px solid var(--tab-active-border);
            border-radius: 30px;
            color: var(--placeholder-text);
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: var(--button-hover);
        }

        .user-info {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border-radius: 20px;
            color: var(--placeholder-text);
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid var(--input-border);
        }

        /* 其他页面占位符 */
        .page-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 24px;
            text-align: center;
            color: var(--placeholder-text);
        }

        .page-placeholder h2 {
            font-size: clamp(2.5rem, 15vw, 4rem);
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 20px;
            color: var(--placeholder-text);
            text-transform: uppercase;
            background: var(--h2-bg);
            padding: 12px 32px;
            border-radius: 80px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--h2-border);
        }

        .page-placeholder p {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            max-width: 400px;
            background: var(--p-bg);
            padding: 14px 32px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--p-border);
            color: var(--placeholder-text);
            margin-top: 16px;
        }

        /* 工作台样式 */
        .workspace-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .draw-card {
            background: var(--p-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--tab-active-border);
            border-radius: 40px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .draw-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--success-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .draw-card:active {
            transform: translateY(0) scale(0.98);
        }

        .draw-icon {
            font-size: 64px;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .draw-title {
            color: var(--placeholder-text);
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            margin: 0;
        }

        .draw-desc {
            color: var(--placeholder-text);
            font-size: 16px;
            opacity: 0.8;
            margin: 0;
        }

        .draw-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 底栏样式 */
        .glass-tabbar {
            width: 100%;
            height: 88px;
            background: linear-gradient(135deg, var(--tabbar-bg-start), var(--tabbar-bg-end));
            backdrop-filter: blur(25px) saturate(200%);
            border-top: 1px solid var(--tabbar-border);
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 16px;
            z-index: 20;
            transition: background 0.3s ease;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tab-inactive);
            padding: 10px 0;
            border-radius: 40px;
            transition: all 0.2s ease;
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            min-height: 64px;
        }

        .tab-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            color: var(--placeholder-text);
        }

        .tab-item.active {
            color: var(--placeholder-text);
            background: var(--tab-active-bg);
            border: 1px solid var(--tab-active-border);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            transform: scale(1.02);
        }

        .tab-icon {
            font-size: 26px;
            margin-bottom: 4px;
        }

        .tab-label {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            color: var(--placeholder-text);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 24px;
            left: 24px;
            background: var(--badge-bg);
            backdrop-filter: blur(16px);
            color: var(--placeholder-text);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid var(--badge-border);
            z-index: 40;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 更多按钮 */
        .more-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--badge-bg);
            backdrop-filter: blur(16px);
            color: var(--placeholder-text);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid var(--badge-border);
            z-index: 40;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .more-btn.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .more-btn:hover {
            background: var(--button-hover);
            transform: scale(1.02);
        }

        /* 右侧浮窗抽屉 */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 320px;
            height: 100%;
            background: var(--drawer-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--tab-active-border);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.3);
            z-index: 101;
            transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .drawer.active {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--tab-active-border);
            color: var(--placeholder-text);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .drawer-close {
            cursor: pointer;
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--button-bg);
            border: 1px solid var(--tab-active-border);
            transition: all 0.2s ease;
        }

        .drawer-close:hover {
            background: var(--button-hover);
            transform: rotate(90deg);
        }

        .drawer-item {
            padding: 18px 24px;
            background: var(--button-bg);
            border: 1px solid var(--tab-active-border);
            border-radius: 30px;
            color: var(--placeholder-text);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .drawer-item:hover {
            background: var(--drawer-item-hover);
            transform: translateX(-5px);
            border-color: var(--tab-active-border);
        }

        .drawer-item-icon {
            font-size: 24px;
        }

        /* 关于面板 */
        .about-panel {
            background: var(--input-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--tab-active-border);
            border-radius: 30px;
            padding: 20px;
            margin-top: 10px;
            color: var(--placeholder-text);
            font-size: 16px;
            line-height: 1.6;
            display: none;
        }

        .about-panel.show {
            display: block;
        }

        /* 自定义毛玻璃弹窗 */
        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--toast-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--toast-border);
            border-radius: 40px;
            padding: 24px 40px;
            color: var(--placeholder-text);
            font-size: 20px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            justify-content: center;
            text-align: center;
            pointer-events: none;
        }

        .custom-toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .toast-icon {
            font-size: 28px;
            color: var(--success-color);
        }

        .toast-message {
            line-height: 1.4;
        }

        .page::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        /* 状态切换 */
        .login-only {
            display: flex;
        }

        .profile-only {
            display: none;
        }

        .profile-only.visible {
            display: flex;
        }
    </style>
</head>

                        <h2 class="draw-title">班级抽签</h2>
                        <p class="draw-desc">点击进入抽签系统</p>
                        <div class="draw-badge">新功能</div>
                    </div>
                    
                    <!-- 预留其他功能位置 -->
                    <div class="more-tools" style="margin-top: 20px; text-align: center; opacity: 0.7;">
                        <p style="color: var(--placeholder-text); font-size: 14px;">⚙️ 更多功能开发中...</p>
                    </div>
                </div>
            </div>
            
            <!-- 个人空间 -->
            <div id="profile" class="page active">
                <!-- 登录界面 -->
                <div id="loginView" class="glass-card login-only">
                    <div class="login-container">
                        <h2 style="color: var(--placeholder-text); margin-bottom: 10px;">QQ登录</h2>
                        <div class="qq-avatar" id="avatarDisplay">
                            <img id="avatarImg" src="" style="display: none;" alt="头像">
                            <span id="avatarPlaceholder" class="avatar-placeholder">输入QQ号预览头像</span>
                        </div>
                        <input type="text" id="qqInput" class="input-field" placeholder="输入QQ号码" value="">
                        <input type="password" id="passwordInput" class="input-field" placeholder="密码 (默认123456)" value="123456">
                        <div class="password-hint">默认密码: 123456</div>
                        <button id="loginBtn" class="login-btn">登 录</button>
                    </div>
                </div>

                <!-- 个人空间界面 -->
                <div id="profileView" class="glass-card profile-only">
                    <div class="profile-content">
                        <h2 style="color: var(--placeholder-text);">个人空间</h2>
                        <div class="profile-avatar">
                            <img id="profileAvatar" src="" alt="用户头像">
                        </div>
                        <div class="nickname-section">
                            <input type="text" id="nicknameInput" class="nickname-input" placeholder="你的昵称">
                            <button id="saveNicknameBtn" class="save-btn">保存</button>
                        </div>
                        <div class="user-info" id="userInfo">
                            QQ号: <span id="displayQQ">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底栏 -->
        <div class="glass-tabbar">
            <div class="tab-item" data-page="home">
                <span class="tab-icon">🏠</span>
                <span class="tab-label">主页</span>
            </div>
            <div class="tab-item" data-page="friends">
                <span class="tab-icon">👥</span>
                <span class="tab-label">好友</span>
            </div>
            <div class="tab-item" data-page="workspace">
                <span class="tab-icon">🛠️</span>
                <span class="tab-label">工作台</span>
            </div>
            <div class="tab-item active" data-page="profile">
                <span class="tab-icon">🧑</span>
                <span class="tab-label">个人</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 页面切换 ==========
            const tabs = document.querySelectorAll('.tab-item');
            const pages = document.querySelectorAll('.page');
            const moreBtn = document.getElementById('moreBtn');
            
            const pageMap = {
                'home': document.getElementById('home'),
                'friends': document.getElementById('friends'),
                'workspace': document.getElementById('workspace'),
                'profile': document.getElementById('profile')
            };

            function switchPage(pageName) {
                pages.forEach(page => page.classList.remove('active'));
                const targetPage = pageMap[pageName];
                if (targetPage) targetPage.classList.add('active');
                
                tabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.page === pageName) tab.classList.add('active');
                });

                // 控制更多按钮显示/隐藏
                if (pageName === 'home') {
                    moreBtn.classList.remove('hidden');
                } else {
                    moreBtn.classList.add('hidden');
                    if (drawer.classList.contains('active')) {
                        closeDrawer();
                    }
                }

                if (pageName === 'profile' && !isLoggedIn) {
                    showLoginView();
                }
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', function(e) {
                    e.preventDefault();
                    const pageName = this.dataset.page;
                    switchPage(pageName);
                });
            });

            // ========== 右侧浮窗抽屉逻辑 ==========
            const drawer = document.getElementById('drawer');
            const drawerOverlay = document.getElementById('drawerOverlay');
            const drawerClose = document.getElementById('drawerClose');
            const aboutBtn = document.getElementById('aboutBtn');
            const aboutPanel = document.getElementById('aboutPanel');

            function openDrawer() {
                drawer.classList.add('active');
                drawerOverlay.classList.add('active');
            }

            function closeDrawer() {
                drawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                aboutPanel.classList.remove('show');
            }

            moreBtn.addEventListener('click', openDrawer);
            drawerClose.addEventListener('click', closeDrawer);
            drawerOverlay.addEventListener('click', closeDrawer);

            aboutBtn.addEventListener('click', function() {
                aboutPanel.classList.toggle('show');
            });

            // ========== 自定义弹窗函数 ==========
            const toast = document.getElementById('customToast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            function showToast(message, icon = '✅', duration = 2000) {
                toastMessage.textContent = message;
                toastIcon.textContent = icon;
                toast.classList.add('show');
                
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ========== QQ登录逻辑 ==========
            const loginView = document.getElementById('loginView');
            const profileView = document.getElementById('profileView');
            const qqInput = document.getElementById('qqInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const avatarImg = document.getElementById('avatarImg');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            const profileAvatar = document.getElementById('profileAvatar');
            const nicknameInput = document.getElementById('nicknameInput');
            const saveNicknameBtn = document.getElementById('saveNicknameBtn');
            const displayQQ = document.getElementById('displayQQ');

            let isLoggedIn = false;
            let currentQQ = '';
            let currentNickname = '';

            function generateRandomNickname() {
                return Math.floor(10000000 + Math.random() * 90000000).toString();
            }

            function showLoginView() {
                loginView.style.display = 'flex';
                profileView.classList.remove('visible');
                profileView.style.display = 'none';
                loginView.classList.add('login-only');
            }

            function showProfileView() {
                loginView.style.display = 'none';
                loginView.classList.remove('login-only');
                profileView.style.display = 'flex';
                profileView.classList.add('visible');
            }

            function updateAvatarPreview(qq) {
                if (qq && /^\d+$/.test(qq)) {
                    const avatarUrl = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=640`;
                    avatarImg.src = avatarUrl;
                    avatarImg.style.display = 'block';
                    avatarPlaceholder.style.display = 'none';
                } else {
                    avatarImg.style.display = 'none';
                    avatarPlaceholder.style.display = 'block';
                }
            }

            qqInput.addEventListener('input', function(e) {
                const qq = e.target.value.trim();
                updateAvatarPreview(qq);
            });

            loginBtn.addEventListener('click', function() {
                const qq = qqInput.value.trim();
                const password = passwordInput.value.trim();

                if (!qq || !/^\d+$/.test(qq)) {
                    showToast('请输入有效的QQ号码', '❌', 1500);
                    return;
                }

                if (password !== '123456') {
                    showToast('密码错误，默认密码为123456', '❌', 1500);
                    return;
                }

                showToast('登录成功', '✅', 1500);
                
                setTimeout(() => {
                    isLoggedIn = true;
                    currentQQ = qq;
                    
                    currentNickname = generateRandomNickname();
                    nicknameInput.value = currentNickname;
                    
                    const avatarUrl = `https://q1.qlogo.cn/g?b=qq&nk=${qq}&s=640`;
                    profileAvatar.src = avatarUrl;
                    
                    displayQQ.textContent = qq;
                    
                    showProfileView();
                    
                    tabs.forEach(tab => {
                        if (tab.dataset.page === 'profile') {
                            tab.classList.add('active');
                        }
                    });
                }, 800);
            });

            saveNicknameBtn.addEventListener('click', function() {
                const newNickname = nicknameInput.value.trim();
                if (newNickname) {
                    currentNickname = newNickname;
                    showToast('昵称已更新', '✏️', 1500);
                } else {
                    showToast('昵称不能为空', '⚠️', 1500);
                }
            });

            showLoginView();

            // ========== 主题切换 ==========
            const themeToggle = document.getElementById('themeToggleBtn');
            const body = document.body;

            function setTheme(theme) {
                if (theme === 'day') {
                    body.classList.add('theme-day');
                    body.classList.remove('theme-night');
                    themeToggle.innerHTML = '<span>☀️</span> 日间模式';
                } else {
                    body.classList.add('theme-night');
                    body.classList.remove('theme-day');
                    themeToggle.innerHTML = '<span>🌙</span> 夜间模式';
                }
            }

            themeToggle.addEventListener('click', function() {
                if (body.classList.contains('theme-night')) {
                    setTheme('day');
                } else {
                    setTheme('night');
                }
            });

            // 初始化
            switchPage('profile');
        })();
    </script>
</body>
</html>
